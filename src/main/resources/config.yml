# ==========================================================
# Deruy Plugin 설정 파일 - 모든 기능이 여기서 설정 가능합니다.
# ==========================================================

lifesteal:
  enabled: true
  zero-heart-ban-message: "§c하트를 모두 잃어 서버에서 추방되었습니다."

  # pending #4: 트라이던트 리피터틴을 "컴벳태그 중일 때만" 금지
  trident:
    restrict-only-in-combat: true

  # pending #5: 겉날개 / 엔더상자는 "컴벳태그 중일 때만" 제한
  restrictions:
    elytra-blocked: true
    ender-chest-blocked: true
    # 기본룰: 엔더진주 사용 금지
    ender-pearl-blocked: true

  # pending #13: 네더라이트 "장비 제작(스미싱 업그레이드)"만 차단. 기존 장비는 사용 가능.
  recipe-block:
    netherite-upgrade-smithing: false

combat-tag:
  duration-seconds: 15

# 컴벳태그 상태일때 특정 WorldGuard 리전 진입을 막는 기능 (WorldGuard 필요)
combat-zone:
  enabled: true
  protected-regions:
    - "spawn"

# 커스텀 로케이터바 (액션바 기반, 은신/투명 무시하고 항상 표시)
locatorbar:
  enabled: false
  update-interval-ticks: 20

# KOTH 거점점령 (다중구역, 선택적 시작 지원)
koth:
  enabled: false
  required-seconds: 60

# 빙고 이벤트
bingo:
  size: 5
  lines-required: 1
  excluded-biomes: []
  excluded-items: []

# 일반 서플라이드랍 (매일 지정 시간대 안에서 아무도 모르는 랜덤시각 자동실행)
# 트리거되면 상자 1개가 아니라 duration-minutes 동안 count-min~count-max 개가 흩뿌려짐
supplydrop:
  normal:
    window-start-hour: 15
    window-end-hour: 24
    duration-minutes: 15
    count-min: 20
    count-max: 30
    center-x: 0
    center-z: 0
    radius: 200
    reward-items:
      - DIAMOND
      - GOLDEN_APPLE

  # 슈퍼 서플라이드랍 (하루 여러개의 "정확한 시간대"를 직접 지정)
  # 트리거되면 duration-minutes 동안 count-min~count-max 개의 고급 상자가 흩뿌려짐
  super:
    windows:
      - "12:45-13:00"
      - "16:45-17:00"
      - "18:45-19:00"
    duration-minutes: 15
    count-min: 7
    count-max: 15
    center-x: 0
    center-z: 0
    radius: 300
    reward-items:
      - NETHERITE_INGOT
      - ENCHANTED_GOLDEN_APPLE

# 바운티 이벤트
bounty:
  reward-items:
    - DIAMOND_BLOCK

# 엔더드래곤 / 드래곤알
dragon:
  health: 200.0
  egg:
    relocate-on-death: true
    fixed-x: 0
    fixed-y: 65
    fixed-z: 0
    acquire-hold-seconds: 30

# 토템 작동 여부 (기본 true = 정상 작동)
totem:
  enabled: true

# 사망시 포션이팩트 유지 여부
death:
  keep-potion-effects: true

# 화살이 몸에 박히지 않게
arrow:
  no-stick: true

# 특정 현실시간에 특정 LuckPerms 역할에게 포션이팩트 자동 부여
role-effects:
  schedule: []
  # 예시 (주석 해제 후 사용):
  # schedule:
  #   - time: "09:00"
  #     role: "gwn"
  #     effect: "RESISTANCE"
  #     amplifier: 0
  #     duration-seconds: 86400
  #   - time: "09:00"
  #     role: "gwn"
  #     effect: "LUCK"
  #     amplifier: 0
  #     duration-seconds: 86400
