# ==========================================================
# Deruy Plugin 설정 파일 - 모든 기능이 여기서 설정 가능합니다.
# ==========================================================

lifesteal:
  enabled: true
  zero-heart-ban-message: "§c하트를 모두 잃어 서버에서 추방되었습니다."

  # pending #4: 트라이던트 리피터틴을 "컴벳태그 중일 때만" 금지
  trident:
    restrict-only-in-combat: true

  # pending #5: 겉날개 / 엔더상자는 "컴벳태그 중일 때만" 제한
  restrictions:
    elytra-blocked: true
    ender-chest-blocked: true
    # 기본룰: 엔더진주는 "던지는 것"은 허용, 텔레포트만 금지
    ender-pearl-tp-blocked: true

  # pending #13: 네더라이트 "장비 제작(스미싱 업그레이드)"만 차단. 기존 장비는 사용 가능.
  recipe-block:
    netherite-upgrade-smithing: false

  # 자연사(낙사/익사/용암/굶주림 등 PVP가 아닌 사망)에도 하트를 깎을지 (3주차부터 true로)
  natural-death-removes-heart: false

  # 하트 최소/최대 제한. min 도달시 밴, max 도달시 그 이상은 못 받고 대신 아이템으로 드롭됨.
  heart-limits:
    min-hearts: 1
    max-hearts: 10

  # 특정 역할이 특정 역할에게 죽으면 하트 손실을 배수 적용 (예: LE가 FN에게 죽으면 2배)
  # victim-role/killer-role은 roles 섹션에 등록된 이름과 일치해야 함. 여러 쌍 등록 가능.
  double-loss-pairs:
    - victim-role: "LE"
      killer-role: "FN"
      multiplier: 2

  # 커스텀 레시피 전부 여기서 정의. shape는 반드시 3줄, 각 줄 3글자(빈칸은 공백).
  # ingredients의 키(D, E, S 등)는 shape에 쓴 글자와 1:1로 대응.
  # "heart"는 특수 레시피로, 결과 아이템이 자동으로 빨간 염료 아이콘의 소비형 하트 아이템이 됨
  # (우클릭하면 소비되고 하트 1개 지급).
  recipes:
    heart:
      result-material: RED_DYE
      result-name: "&c하트"
      shape: ["DED", "EEE", "DED"]
      ingredients:
        D: DIAMOND
        E: ENCHANTED_GOLDEN_APPLE
    totem:
      result-material: TOTEM_OF_UNDYING
      shape: ["DED", "ESE", "DED"]
      ingredients:
        D: DIAMOND_BLOCK
        E: ENCHANTED_GOLDEN_APPLE
        S: NETHER_STAR
    mace:
      result-material: MACE
      shape: ["HNH", " B ", " B "]
      ingredients:
        H: HEAVY_CORE
        N: NETHERITE_BLOCK
        B: BREEZE_ROD
    golden_apple:
      result-material: GOLDEN_APPLE
      shape: ["GGG", "GAG", "GGG"]
      ingredients:
        G: GOLD_INGOT
        A: APPLE
    custom_netherite_sword:
      result-material: NETHERITE_SWORD
      result-name: "&5&l용살자의 검"
      shape: ["ABA", "CDC", "AEA"]
      ingredients:
        A: SHULKER_SHELL
        B: DRAGON_EGG
        C: ELYTRA
        D: DIAMOND_SWORD
        E: DRAGON_BREATH
    custom_netherite_chestplate:
      result-material: NETHERITE_CHESTPLATE
      result-name: "&5&l용살자의 흉갑"
      shape: ["ABC", "DED", "FGF"]
      ingredients:
        A: CRIMSON_FUNGUS
        B: NETHERITE_UPGRADE_SMITHING_TEMPLATE
        C: WARPED_FUNGUS
        D: END_CRYSTAL
        E: DIAMOND_CHESTPLATE
        F: ANCIENT_DEBRIS
        G: NETHER_STAR

# 특정 레시피 결과물의 "서버 전체 동시 존재 개수"를 제한.
# 반드시 문자열로 따옴표 씌워서 입력할 것 (숫자로 두면 "0"과 "00"을 구분 못함).
#   "0"  -> 제작 자체가 불가능 (완전 차단)
#   "00" -> 무제한 (개수 제한 없음)
#   그 외 숫자문자열(예: "3") -> 서버 전체에서 그 개수까지만 제작 가능
# 카운트는 "제작 성공 시점"에만 +1 되고, 아이템이 파괴/소실돼도 자동으로 안 줄어듭니다.
# 잘못된 개수를 바로잡고 싶으면 /lifesteal itemlimit reset <레시피이름> [개수] 커맨드 사용.
item-limits:
  totem: "3"
  mace: "2"
  custom_netherite_chestplate: "5"

combat-tag:
  duration-seconds: 15

# 컴벳태그 상태일때 특정 WorldGuard 리전 진입을 막는 기능 (WorldGuard 필요)
combat-zone:
  enabled: true
  protected-regions:
    - "spawn"
  # 컴벳태그 상태로 구역 근처 접근시 경계를 빨간 유리로 표시 (본인에게만 보임, 실제 블록 안바뀜)
  visualize-enabled: true
  visualize-radius: 8

# 투명화 상태 유저 대상 부가 이펙트 (SimpleVoiceChat 필요, /autotune·/killlog 명령어로 인게임에서 즉시 온오프)
voice-effects:
  # 투명화 중 마이크 음성에 피치 다운시프트("오토튠") 적용 여부
  autotune-enabled: true
  # 투명화 상태로 킬을 냈을 때 킬로그(사망메시지)의 킬러 이름을 하얀 노이즈(§k)로 표시할지 여부
  killlog-obfuscation-enabled: true

# 커스텀 로케이터바 (액션바 기반, 은신/투명 무시하고 항상 표시)
locatorbar:
  enabled: false
  update-interval-ticks: 20
  display-name: "Super LocatorBar"

# KOTH 거점점령 (다중구역, 선택적 시작 지원)
# reward-items는 서플라이드랍과 동일하게 "아이템명:확률" 형식 (확률 생략시 100%)
koth:
  enabled: false
  required-seconds: 60
  # /koth zones 로 구역 테두리를 빨간유리로 표시할 때 몇 초간 유지할지
  zones-visualize-duration-seconds: 15
  reward-items:
    - "DIAMOND:0.5"
    - "GOLDEN_APPLE:0.3"

# 빙고 이벤트 (완성시 승리팀 소속 전원에게 reward-items 지급)
bingo:
  size: 5
  # 여러 줄수를 동시에 목표로 설정 가능. 각 줄수 달성마다 방송+보상, 마지막 값이 "최종 목표".
  line-milestones: [1, 3, 5]
  # 최종 목표(line-milestones의 가장 큰 값) 달성시 이벤트를 자동종료할지 여부
  end-on-bingo: true
  excluded-biomes: []
  excluded-items: []
  reward-items:
    - "DIAMOND:0.5"
    - "NETHERITE_INGOT:0.2"

# 일반 서플라이드랍 (매일 지정 시간대 안에서 아무도 모르는 랜덤시각 자동실행)
# 트리거되면 상자 1개가 아니라 duration-minutes 동안 count-min~count-max 개가 흩뿌려짐
# reward-items는 "아이템명" 또는 "아이템명:확률" 형식. 확률 생략시 100%로 취급.
# 예: "DIAMOND:0.1" = 그 상자에 10% 확률로 다이아 1개 포함
#
# 스폰 구역: 인게임에서 /supplydrop setregion 1, /supplydrop setregion 2 로
# 두 코너(월드 포함)를 지정하면 그 구역 안에서만 스폰됨 (data.yml에 저장, 재시작해도 유지).
# 구역을 지정 안 하면 아래 center-x/z + radius 방식으로 폴백 (첫번째 월드 기준).
supplydrop:
  normal:
    window-start-hour: 15
    window-end-hour: 24
    duration-minutes: 15
    count-min: 20
    count-max: 30
    center-x: 0
    center-z: 0
    radius: 200
    reward-items:
      - "DIAMOND:0.3"
      - "GOLDEN_APPLE:0.5"
      - "IRON_INGOT:0.8"

  # 슈퍼 서플라이드랍 (하루 여러개의 "정확한 시간대"를 직접 지정)
  # 트리거되면 duration-minutes 동안 count-min~count-max 개의 고급 상자가 흩뿌려짐
  # 스폰 구역: /supersupplydrop setregion 1, /supersupplydrop setregion 2 로 별도 지정 가능
  super:
    windows:
      - "12:45-13:00"
      - "16:45-17:00"
      - "18:45-19:00"
    duration-minutes: 15
    count-min: 7
    count-max: 15
    center-x: 0
    center-z: 0
    radius: 300
    reward-items:
      - "NETHERITE_INGOT:0.2"
      - "ENCHANTED_GOLDEN_APPLE:0.4"

# 바운티 이벤트
bounty:
  # 바운티 대상이 사망(성공)하면 이벤트 전체를 자동종료할지 여부
  end-on-death: false
  reward-items:
    - "DIAMOND_BLOCK:1.0"

# 엔더드래곤 / 드래곤알
dragon:
  health: 200.0
  egg:
    relocate-on-death: true
    fixed-x: 0
    fixed-y: 65
    fixed-z: 0
    acquire-hold-seconds: 30
    # 드래곤알의 텔레포트 능력 차단 여부. false로 하면 바닐라처럼 다시 순간이동함.
    block-teleport: true

# 토템 작동 여부 (기본 true = 정상 작동)
totem:
  enabled: true
  # 불사의 토템 사용시 기존에 갖고있던 포션이펙트가 사라지지 않게 유지
  keep-effects-on-use: true

# 사망시 포션이팩트 유지 여부
death:
  keep-potion-effects: true

# 화살이 몸에 박히지 않게
arrow:
  no-stick: true

# 역할(LuckPerms 그룹)별 개별 설정. 여기 등록된 이름이 /pvp 커맨드, role-effects,
# 역할별 하트상한 전부에서 공통으로 쓰임. max-hearts 생략시 전역 heart-limits.max-hearts 사용.
# pvp-allowed 생략시 기본 true(허용).
roles:
  FWN:
    max-hearts: 13
    pvp-allowed: true
  LV:
    max-hearts: 20
    pvp-allowed: true
  LE:
    pvp-allowed: true
  FN:
    pvp-allowed: true

# 모든 제한 기능에서 출력되는 메시지를 여기서 자유롭게 수정 가능 (& 색상코드 지원)
messages:
  ender-pearl-tp-blocked: "&c엔더진주로 인한 텔레포트가 금지되어 있습니다. (던지는 것은 가능)"
  elytra-blocked: "&c전투 중에는 겉날개로 활공할 수 없습니다."
  ender-chest-blocked: "&c전투 중에는 엔더상자를 사용할 수 없습니다."
  trident-blocked: "&c전투 중에는 트라이던트 순간이동을 사용할 수 없습니다."
  netherite-craft-blocked: "&c현재 네더라이트 장비 제작이 비활성화되어 있습니다. (기존 장비는 사용 가능)"
  combat-zone-blocked: "&c전투 중에는 이 구역에 들어갈 수 없습니다."
  dragon-egg-combat-blocked: "&c전투 중에는 드래곤알을 획득할 수 없습니다."
  dragon-egg-acquiring: "&5드래곤알을 획득하는 중입니다... {seconds}초간 가만히 있으세요."
  dragon-egg-acquired: "&5&l드래곤알을 획득했습니다!"
  dragon-egg-acquire-cancelled: "&c드래곤알 획득이 중단되었습니다."
  pvp-blocked: "&c지금은 PVP가 금지되어 있습니다."
  bounty-target-killed: "&4&l[바운티] &a{killer}님이 타겟 {victim}님을 처치했습니다!"

# 특정 현실시간에 특정 LuckPerms 역할에게 포션이팩트 자동 부여
role-effects:
  schedule: []
  # 예시 (주석 해제 후 사용):
  # schedule:
  #   - time: "09:00"
  #     role: "gwn"
  #     effect: "RESISTANCE"
  #     amplifier: 0
  #     duration-seconds: 86400
  #   - time: "09:00"
  #     role: "gwn"
  #     effect: "LUCK"
  #     amplifier: 0
  #     duration-seconds: 86400
